<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Abstract grid/capacity mark: three offset rounded rectangles -->
  <rect x="4" y="4" width="24" height="24" rx="4" fill="#1565C0"/>
  <rect x="20" y="20" width="24" height="24" rx="4" fill="#42A5F5" opacity="0.85"/>
  <rect x="36" y="36" width="24" height="24" rx="4" fill="#90CAF9" opacity="0.75"/>
  <!-- Connecting diagonal accent -->
  <line x1="16" y1="16" x2="48" y2="48" stroke="#0D47A1" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
</svg>
